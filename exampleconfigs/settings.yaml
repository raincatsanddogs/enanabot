server:
  #这里填你的服务器地址以及配置，多个地址请复制粘贴增加，以下为示例
  #- url: "example.com" 服务器地址
  #  port: 25565 服务器端口，默认为25565
  #  version: "1.xx.x" 服务器版本，格式为1.xx.x/xx.x/1.xx
  - url: ""
    port: 25565
    version: "1.xx.x"

connect:
  #这里填你的与外部的连接设置，以下为示例
  #- timeout: 10 连接超时时间，单位为秒，默认为10秒
  #  retry: 3 连接重试次数，默认为3次
  #  host: "localhost" 连接的主机地址，默认为localhost
  #  port: xxxxx 连接的端口
  #  send_group: [123456789] 仅这些群号的消息会转发到 MC（严格白名单，留空表示不转发）
  #  ignore_user: [10001] 这些用户的消息不会转发到 MC
  #  forward_prefix: "[群聊]>>" 发往 MC 的桥接消息前缀
  #  admin_players: ["player1"] 可通过 MC 私聊执行所有指令的玩家名列表（管理员）
  #  user_players: ["player2"] 可通过 MC 私聊执行部分安全指令的玩家名列表（普通用户）
  #  guest_players: ["player3"] 可选显式访客列表；未命中 admin/user 的玩家默认同样视为 guest
  #  whisper_command_prefix: "#" MC 私聊指令前缀，如 #mc status
  timeout: 10
  retry: 3
  host: "localhost"
  port: xxxxx
  send_group: []
  ignore_user: []
  forward_prefix: "[群聊]>>"
  admin_players: []
  user_players: []
  guest_players: []
  whisper_command_prefix: "#"
  